# =============================================================================
# Yugabyte PostgreSQL Configuration (ysql_pg_conf)
# =============================================================================
# Este arquivo é montado como volume no container do YugabyteDB.
# O YB-TServer lê essas configurações e as injeta nativamente no Postmaster,
# protegendo strings contendo vírgulas do malformado parser Python yugabyted.
#
# Configurações definidas:
# - shared_preload_libraries: Carrega as extensões nativas (pg_cron, pgaudit) 
#   direto na RAM durante o boot, vital para o Control Plane.
# =============================================================================

shared_preload_libraries = 'pg_cron,pg_stat_statements,pgaudit'
